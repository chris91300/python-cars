{% include 'templateTop.html' %}

<main>
    <h1>Bienvenue dans <span>CARSSSS</span></h1>
    <h2>Nos {{ brand }}</h2>
    {% if cars|length < 1 %}
    <p>Désole nous n'avons pas de {{ brand }}</p>

    {% else %}

    <ul class="car_list">
    {% for car in cars %}
    <li class="car">
        <a href="/cars/{{car.car_id}}">
            {{ car.brand }} {{ car.model }}
        </a>
    </li>
    {% endfor %}
    </ul>
    {% endif %}
</main>

{% include 'templateBottom.html' %}
